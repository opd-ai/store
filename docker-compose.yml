version: '3.8'

services:
  # Mock PayWall service for testing
  # In production, replace with actual opd-ai/paywall deployment
  paywall-mock:
    image: golang:1.21-alpine
    working_dir: /app
    volumes:
      - ./deployments/mocks:/app
    command: go run mock_paywall.go
    ports:
      - "8081:8081"
    environment:
      PAYWALL_PORT: "8081"
    networks:
      - store_network

  # MinIO service for S3-compatible object storage (testing)
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - store_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Main store service
  store:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Database configuration
      STORE_DATABASE_PATH: "/app/data/store.db"
      
      # Server configuration
      STORE_PORT: "8080"
      STORE_HOST: "0.0.0.0"
      
      # Paywall integration
      STORE_PAYWALL_URL: "http://paywall-mock:8081"
      
      # Admin token for API authentication
      STORE_ADMIN_TOKEN: "admin-secret-token-12345"
      
      # File storage
      STORE_TEMPLATES_DIR: "/app/templates"
      STORE_UPLOADS_DIR: "/app/data/uploads"
      
      # S3/MinIO configuration (for testing)
      AWS_ENDPOINT: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      AWS_REGION: "us-east-1"
      
      # Logging
      STORE_LOG_LEVEL: "debug"
      STORE_LOG_FORMAT: "json"
    depends_on:
      paywall-mock:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ./templates:/app/templates
      - ./data:/app/data
      - store_data:/app/data
    networks:
      - store_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  store_data:
    driver: local
  minio_data:
    driver: local

networks:
  store_network:
    driver: bridge
