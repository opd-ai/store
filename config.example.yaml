# opd-ai/store Configuration File
# This is an example configuration file showing all available options with their defaults.
# You can copy this file and customize it for your deployment.

# Server Configuration
server_port: "8080"
read_timeout: 10s
write_timeout: 10s
shutdown_timeout: 30s

# Database Configuration
database_path: "./data/store.db"

# Embedded Paywall Configuration
# Use testnet for development, mainnet for production
paywall_testnet: true
paywall_db_path: "./data/paywall.db"
paywall_timeout: 24h
paywall_min_confirmations: 1

# Payment Modes per Handler Type
# Options: "single-sig" or "multisig-escrow"
payment_mode_digital: "single-sig"      # Digital media - instant delivery
payment_mode_shipping: "multisig-escrow" # Physical goods - escrow protection
payment_mode_pod: "single-sig"          # Print-on-demand - provider handled

# Multisig/Escrow Configuration (for physical goods)
# Enable multisig escrow for shipping_form handler
multisig_enabled: false

# Store operator's Bitcoin public key (hex-encoded compressed public key)
# Generate with Bitcoin wallet
seller_public_key: ""

# Arbiter's Bitcoin public key (for dispute resolution)
arbiter_public_key: ""

# Store operator's Bitcoin private key (hex-encoded, will be encrypted)
# IMPORTANT: Keep this secure! Use environment variable in production
seller_private_key: ""

# Escrow timeout for physical goods (default: 7 days)
escrow_timeout_physical: 168h

# Encryption Settings
# Enable encryption for backend configuration data
encryption_enabled: true

# Base64-encoded 32-byte encryption key
# Generate with: openssl rand -base64 32
encryption_key: ""

# Rate Limiting
rate_limit_enabled: true
rate_limit_rpm: 60        # Requests per minute
rate_limit_burst: 10      # Burst capacity

# CSRF Protection
# Enable CSRF protection for form submissions
csrf_enabled: true

# Admin API
# Authentication token for admin endpoints
# Generate with: openssl rand -base64 32
admin_token: ""

# CORS Configuration
# List of allowed origins for CORS requests
cors_origins:
  - "*"  # Allow all origins (not recommended for production)
  # - "https://example.com"
  # - "https://app.example.com"

